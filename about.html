<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terraflux | Page</title>

<style>
/* ===== BODY ===== */
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  padding-top: 70px; /* space for fixed header */
  background: #0b0b0f;
  color: #eee;
}

/* ===== HEADER + NAVIGATION SESSION ===== */
header {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  background: rgba(15,15,15,0.95);
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 6%;
  z-index: 1000;
  border-bottom: 1px solid rgba(212,175,55,0.3);
}

.logo {
  color: #D4AF37;
  font-size: 20px;
  font-weight: bold;
  letter-spacing: 1px;
  cursor: pointer;
}

nav {
  display: flex;
  gap: 30px;
}

nav a {
  color: #D4AF37;
  text-decoration: none;
  font-size: 15px;
  transition: 0.3s;
}

nav a:hover {
  color: #ffd700;
}

.menu-btn {
  display: none;
  font-size: 26px;
  color: #D4AF37;
  cursor: pointer;
}

@media(max-width:900px){
  nav {
    position: fixed;
    top: 65px;
    right: -100%;
    background: #111;
    width: 220px;
    flex-direction: column;
    align-items: center;
    padding: 20px 0;
    gap: 20px;
    transition: right 0.3s ease;
  }

  nav.active {
    right: 0;
  }

  nav a {
    padding: 10px 0;
  }

  .menu-btn {
    display: block;
  }
}
</style>
</head>

<body>

<header>
  <div class="logo" onclick="window.location.href='index.html'">TERRAFLUX</div>

  <nav id="navMenu">
    <a href="index.html">Home</a>
    <a href="logistics.html">Logistics</a>
    <a href="warehousing.html">Warehousing</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
  </nav>

  <div class="menu-btn" onclick="toggleMenu()">☰</div>
</header>

<script>
const navMenu = document.getElementById("navMenu");
const menuBtn = document.querySelector(".menu-btn");

function toggleMenu() {
  navMenu.classList.toggle("active");
  menuBtn.classList.toggle("active");
}

// Auto-close menu when a link is clicked (mobile)
const navLinks = navMenu.querySelectorAll("a");
navLinks.forEach(link => {
  link.addEventListener("click", () => {
    navMenu.classList.remove("active");
    menuBtn.classList.remove("active");
  });
});
</script>

</body>
</html>
