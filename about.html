```html
<!-- ===== HEADER SECTION START ===== -->

<style>
:root{
--gold:#D4AF37;
--black:#0b0b0f;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

header{
position:fixed;
top:0;
left:0;
width:100%;
background:rgba(0,0,0,0.9);
backdrop-filter:blur(10px);
padding:18px 8%;
display:flex;
justify-content:space-between;
align-items:center;
z-index:1000;
border-bottom:1px solid rgba(212,175,55,0.3);
font-family:Segoe UI, sans-serif;
}

/* LOGO */

.logo{
color:var(--gold);
font-size:20px;
font-weight:700;
letter-spacing:2px;
cursor:pointer;
}

/* NAVIGATION */

#navLinks{
display:flex;
gap:35px;
}

#navLinks a{
color:#ccc;
text-decoration:none;
font-size:16px;
transition:.3s;
}

#navLinks a:hover{
color:var(--gold);
}

/* HAMBURGER */

#hamburger{
display:none;
flex-direction:column;
gap:5px;
cursor:pointer;
}

#hamburger span{
width:26px;
height:3px;
background:var(--gold);
transition:0.3s;
}

/* MOBILE NAVIGATION */

@media(max-width:900px){

#navLinks{
position:fixed;
top:70px;
right:-100%;
width:250px;
height:100vh;
background:#111;
flex-direction:column;
padding:40px 25px;
gap:25px;
transition:0.4s;
}

#navLinks.active{
right:0;
}

#hamburger{
display:flex;
}

}
</style>


<header>

<div class="logo" onclick="location.href='index.html'">
TERRAFLUX
</div>

<nav id="navLinks">
<a href="index.html">Home</a>
<a href="logistics.html">Logistics</a>
<a href="warehousing.html">Warehousing</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
</nav>

<div id="hamburger">
<span></span>
<span></span>
<span></span>
</div>

</header>


<script>

const hamburger = document.getElementById("hamburger");
const navLinks = document.getElementById("navLinks");

hamburger.onclick = () => {
navLinks.classList.toggle("active");
};

</script>

<!-- ===== HEADER SECTION END ===== -->
```
