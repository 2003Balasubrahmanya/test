```html
<!-- ===== HEADER SESSION START ===== -->

<style>

body{
margin:0;
font-family:Arial, sans-serif;
padding-top:70px;
}

/* HEADER */

header{
position:fixed;
top:0;
left:0;
width:100%;
background:#0f0f0f;
display:flex;
justify-content:space-between;
align-items:center;
padding:16px 6%;
z-index:1000;
}

/* LOGO */

.logo{
color:#D4AF37;
font-size:18px;
font-weight:bold;
letter-spacing:1px;
}

/* NAVIGATION */

nav{
display:flex;
gap:30px;
}

nav a{
color:#D4AF37;
text-decoration:none;
font-size:15px;
}

/* HAMBURGER */

.menu-btn{
display:none;
font-size:26px;
color:#D4AF37;
cursor:pointer;
}

/* MOBILE */

@media(max-width:768px){

nav{
position:absolute;
top:65px;
right:0;
background:#111;
width:200px;
flex-direction:column;
align-items:center;
display:none;
padding:20px 0;
}

nav a{
padding:10px 0;
}

nav.active{
display:flex;
}

.menu-btn{
display:block;
}

}

</style>

</nav>
